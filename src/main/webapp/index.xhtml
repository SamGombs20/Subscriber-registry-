<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:p="http://primefaces.org/ui">

<f:view encoding="UTF-8">
    <h:head>
        <title>MSpace Subscriber Registry</title>
        <style>
            body{
                margin: 0;
            }
            .header-card{
                display: flex;
                flex-direction: row;
                align-items: center;
                justify-content: center;
            }
            .header-card .img{
                padding-top: 0.5rem;
                width: 100px;
                height: auto;
                object-fit: contain;
            }

            .nav-title{
                margin: 0;
                font-size: 1.4rem;
            }
            .main-container{
                margin-top: 2rem;
                max-width: 900px;
                margin-left: auto;
                margin-right: auto;
                padding: 1rem;
            }
            .action-btn-container{
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }
            .title-container{
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 3rem;
            }
            .btn{
              align-items: center;
                font-size: 0.8rem;
            }
            .form-btn-container{
                display: flex;
                justify-content: flex-end;
                gap: 1rem;
                margin-top: 1rem;
            }
            .input-container{
                display: flex;
                flex-direction: column;
                gap: 0.5rem;
                margin-bottom: 1rem;
            }

        </style>
    </h:head>
    <h:body>
        <p:growl id="global-messages" showDetail="true" closable="true" skipDetailIfEqualsSummary="true" />
        <p:card styleClass="header-card">
            <f:facet name="header">
                <h:graphicImage library="images" name="company_logo.jpeg" styleClass="img" alt="Company Logo" />

            </f:facet>
            <h4 class="nav-title">Subscriber Registry</h4>
        </p:card>
        <div class="main-container">
           <div class="title-container">
               <h:outputText value="All Subscribers" styleClass="ui-widget" style="font-size: 1.4rem;font-weight: 600; color: darkblue;"/>
               <p:commandButton icon="pi pi-plus" update=":addForm" action="#{subscriberBean.newSubscriber()}" oncomplete="PF('addDialog').show();" styleClass="ui-button-outlined ui-button-info" value="Add subscriber"/>
           </div>
            <p:divider/>
            <h:form id="exporter-form">
                <div class="action-btn-container" style="margin-bottom: 1rem;margin-top: 2rem">
                    <p:commandButton ajax="false" value="Export PDF" icon="pi pi-file-pdf" styleClass="ui-button-danger rounded-button btn">
                        <p:dataExporter fileName="MSpace_subscribers" type="pdf" target=":subscribers-form:subscriber-table"/>
                    </p:commandButton>
                    <p:commandButton ajax="false" value="Export XLS" icon="pi pi-file-excel" styleClass="ui-button-success rounded-button btn">
                        <p:dataExporter fileName="MSpace_subscribers" type="xlsx" target=":subscribers-form:subscriber-table"/>
                    </p:commandButton>
                </div>
            </h:form>
            <h:form id="subscribers-form" enctype="application/x-www-form-urlencoded">
                <p:dataTable id="subscriber-table" paginator="true" rows="10" var="subscriber" paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink}"
                             value="#{subscriberBean.subscribers}" currentPageReportTemplate="Showing {startRecord}-{endRecord} of {totalRecords}">

                    <p:column headerText="Full Name">
                        <h:outputText value="#{subscriber.fullName}"/>
                    </p:column>
                    <p:column headerText="Phone number">
                        <h:outputText value="#{subscriber.phoneNumber}"/>
                    </p:column>
                    <p:column headerText="Status">
                        <h:outputText value="#{subscriber.status}"/>
                    </p:column>
                    <p:column headerText="Actions" exportable="false">
                        <div class="action-btn-container">
                            <p:commandButton icon="pi pi-user-edit" process="@this" update=":addForm" oncomplete="PF('addDialog').show();" action="#{subscriberBean.editSubscriber(subscriber)}" styleClass="rounded-button ui-button-info ui-button-flat"/>
                            <p:commandButton icon="pi pi-trash"
                                             process="@this"
                                             action="#{subscriberBean.initiateSubDelete(subscriber.id)}"
                                             oncomplete="PF('deleteConfirmation').show();"
                                             styleClass="rounded-button ui-button-danger ui-button-flat"/>
                        </div>
                    </p:column>
                </p:dataTable>

            </h:form>
        </div>
        <h:form id="addForm">
            <p:dialog header="#{subscriberBean.selectedSubId==null?'Add New Subscriber':'Edit Subscriber'}" widgetVar="addDialog" closable="true" modal="true" resizable="false" global="true" showEffect="fade" hideEffect="fade" responsive="true" width="350">
<!--                <p:panelGrid columns="2" style="width: 100%; padding: 1rem">-->
<!--                    -->
<!--                </p:panelGrid>-->
<!--                <p:messages id="messages" showSummary="true"  closable="true"/>-->
                <div class="input-container">
                    <p:outputLabel for="fullName" value="Full Name"/>
                    <p:inputText id="fullName" value="#{subscriberBean.fullName}" required="true" placeholder="Enter full name"
                                 requiredMessage="Full name is required" style="width: 100%"/>
                </div>
                <div class="input-container">
                    <p:outputLabel for="phoneNumber" value="Phone Number"/>
                    <p:inputText id="phoneNumber" requiredMessage="Phone number is required" validator="#{subscriberBean.validatePhone}" value="#{subscriberBean.phoneNumber}" required="true" placeholder="254XXXXXXXXX">
                    </p:inputText>
                </div>
                <div class="input-container">
                    <p:outputLabel for="status" value="Status"/>
                    <p:selectOneMenu id="status"  value="#{subscriberBean.status}" required="true" requiredMessage="Status is required">
                        <f:selectItem itemLabel="-- Select Status --" itemValue=""/>
                        <f:selectItem itemValue="Active" itemLabel="Active"/>
                        <f:selectItem itemValue="Inactive" itemLabel="Inactive"/>
                    </p:selectOneMenu>
                </div>
                <div class="form-btn-container">
                    <p:commandButton value="Save" process="@form" action="#{subscriberBean.addSubscriber()}" update="global-messages :subscribers-form:subscriber-table"
                                     oncomplete="if(!args.validationFailed) PF('addDialog').hide();" styleClass="ui-button-success rounded-button btn"/>
                    <p:commandButton process="@this" action="#{subscriberBean.newSubscriber()}" update=":addForm" value="Cancel" oncomplete="PF('addDialog').hide();" styleClass="ui-button-secondary rounded-button btn" />
                </div>
            </p:dialog>
        </h:form>
        <p:confirmDialog widgetVar="deleteConfirmation"
                         header="Confirm Deletion"
                         message="Are you sure you want to permanently delete this subscriber?"
                         severity="warn"
                         width="380">
            <h:form id="deleteDialogForm">
                <div style="display: flex; justify-content: flex-end; gap: 0.5rem;">
                    <p:commandButton value="Cancel"
                                     type="button"
                                     onclick="PF('deleteConfirmation').hide();"
                                     styleClass="ui-button-secondary ui-button-flat"/>
                    <p:commandButton value="Yes, Delete"
                                     action="#{subscriberBean.deleteSubscriber()}"
                                     update=":global-messages :subscribers-form:subscriber-table"
                                     oncomplete="PF('deleteConfirmation').hide();"
                                     styleClass="ui-button-danger"/>
                </div>
            </h:form>
        </p:confirmDialog>
    </h:body>
</f:view>
</html>
